<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>First to 10: 3D Stacked Grid v2.1</title>
  <style>
    /* --- ALL ORIGINAL STYLES REMAIN --- */
    * { box-sizing: border-box; }
    :root {
      --bg-color: #08080a;
      --neon-cyan: #00f3ff;
      --neon-magenta: #ff003c;
      --neon-yellow: #fffb00;
      --grid-size: clamp(180px, 35vmin, 320px);
      --cell-size: calc(var(--grid-size) / 3.5);
      --layer-gap: clamp(120px, 25vmin, 200px);
    }
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
    .app-shell { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    .main-viewport { width: 100%; max-width: 520px; height: 100%; background: var(--bg-color); position: relative; display: flex; flex-direction: column; overflow: hidden; }
    
    /* --- HUD & UI --- */
    header { text-align: center; padding: 5px 0; z-index: 10; background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%); }
    .status-bar { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; padding: 8px 16px; margin: 10px auto; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 243, 255, 0.3); border-radius: 20px; color: #fff; }
    .dice-container { position: relative; width: 80px; height: 80px; margin: 5px auto; perspective: 1000px; cursor: pointer; z-index: 10; }
    .dice-wheel { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 2.5s cubic-bezier(0.1, 0.8, 0.1, 1); }
    .wheel-face { position: absolute; width: 50px; height: 50px; left: 15px; top: 15px; background: #a00; border: 1px solid #fff2; border-radius: 4px; display: flex; justify-content: center; align-items: center; font-size: 1.4rem; font-weight: 900; color: #fff; backface-visibility: hidden; }
    .wheel-face.highlight { background: var(--neon-yellow); color: #000; box-shadow: 0 0 20px var(--neon-yellow); }

    /* Layout the 9 faces */
    .wheel-face:nth-child(1) { transform: rotateY(0deg) translateZ(69px); }
    .wheel-face:nth-child(2) { transform: rotateY(40deg) translateZ(69px); }
    .wheel-face:nth-child(3) { transform: rotateY(80deg) translateZ(69px); }
    .wheel-face:nth-child(4) { transform: rotateY(120deg) translateZ(69px); }
    .wheel-face:nth-child(5) { transform: rotateY(160deg) translateZ(69px); }
    .wheel-face:nth-child(6) { transform: rotateY(200deg) translateZ(69px); }
    .wheel-face:nth-child(7) { transform: rotateY(240deg) translateZ(69px); }
    .wheel-face:nth-child(8) { transform: rotateY(280deg) translateZ(69px); }
    .wheel-face:nth-child(9) { transform: rotateY(320deg) translateZ(69px); }

    /* --- GAME BOARD --- */
    .game-area { flex-grow: 1; perspective: 1200px; display: flex; justify-content: center; align-items: center; position: relative; touch-action: none; }
    .board-rotation-wrapper { position: relative; width: var(--grid-size); height: var(--grid-size); transform-style: preserve-3d; transform: rotateX(55deg) rotateZ(-25deg); transition: transform 0.1s ease-out; }
    .layer { position: absolute; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 8px; padding: 10px; transform-style: preserve-3d; }
    .layer-top { transform: translateZ(var(--layer-gap)); }
    .layer-mid { transform: translateZ(0); }
    .layer-bot { transform: translateZ(calc(var(--layer-gap) * -1)); }
    .cell { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; color: #fff; cursor: pointer; transition: all 0.2s; transform-style: preserve-3d; }
    .cell.p1 { color: var(--neon-cyan); text-shadow: 0 0 15px var(--neon-cyan); }
    .cell.p2 { color: var(--neon-magenta); text-shadow: 0 0 15px var(--neon-magenta); }
    .cell.valid-target:hover { background: rgba(255, 251, 0, 0.15); border-color: var(--neon-yellow); }
    
    /* --- SUM KNOWLEDGE STYLES --- */
    .line-hint { pointer-events: none; position: absolute; border: 2px dashed var(--neon-yellow); border-radius: 10px; opacity: 0; transition: opacity 0.3s; z-index: 5; }
    .cell.hover-active { background: rgba(255, 251, 0, 0.3) !important; box-shadow: 0 0 20px var(--neon-yellow); }
    .cell.line-member { background: rgba(0, 243, 255, 0.1); border-color: var(--neon-cyan); }
    
    .sum-popup {
      position: absolute;
      top: -35px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--neon-yellow);
      color: #000;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: bold;
      white-space: nowrap;
      pointer-events: none;
      z-index: 100;
      display: none;
    }
    .cell:hover .sum-popup { display: block; }

    /* Settings & Win Overlays (Simplified for briefness, keeping original logic) */
    .settings-overlay, .win-overlay, .rules-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 500; }
    .active { display: flex !important; }
    .settings-content { background: #111; padding: 30px; border: 1px solid var(--neon-cyan); border-radius: 15px; text-align: center; }
    button { background: transparent; border: 1px solid var(--neon-cyan); color: #00f3ff; padding: 10px 20px; cursor: pointer; text-transform: uppercase; margin: 5px; }
    button.active { background: var(--neon-cyan); color: #000; }

    .footer-controls { padding: 15px; display: flex; justify-content: space-evenly; align-items: center; z-index: 10; background: rgba(255,255,255,0.03); border-radius: 40px; margin: 10px; }
  </style>
</head>
<body>
<div class="app-shell">
  <div class="main-viewport" id="main-viewport">
    <header>
      <button onclick="location.reload()" style="position:absolute; left:15px; top:15px; border:none;">🔄</button>
      <div class="status-bar" id="status">Spin to Start</div>
    </header>

    <div class="dice-container" id="dice-container">
      <div class="dice-wheel" id="dice-wheel">
        <div class="wheel-face">1</div><div class="wheel-face">2</div><div class="wheel-face">3</div>
        <div class="wheel-face">4</div><div class="wheel-face">5</div><div class="wheel-face">6</div>
        <div class="wheel-face">7</div><div class="wheel-face">8</div><div class="wheel-face">9</div>
      </div>
    </div>

    <div class="game-area" id="game-area">
      <div class="board-rotation-wrapper" id="board">
        <div class="layer layer-top" data-z="2"></div>
        <div class="layer layer-mid" data-z="1"></div>
        <div class="layer layer-bot" data-z="0"></div>
      </div>
    </div>

    <div class="footer-controls">
      <button id="btn-settings-open">⚙️ Settings</button>
      <button id="btn-rules-open">❓ Rules</button>
    </div>

    <!-- SETTINGS -->
    <div class="settings-overlay" id="settings-overlay">
      <div class="settings-content">
        <h2>Game Mode</h2>
        <button id="mode-1p">1 Player</button>
        <button id="mode-2p" class="active">2 Players</button>
        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        <h2>CPU Difficulty</h2>
        <button id="diff-norm" class="active">Normal</button>
        <button id="diff-hard">Hard</button>
        <br><br>
        <button id="btn-settings-close" style="border-color:var(--neon-yellow); color:var(--neon-yellow);">Confirm</button>
      </div>
    </div>

    <!-- WIN -->
    <div class="win-overlay" id="win-overlay">
      <h1 id="win-title" style="font-size: 3rem; text-shadow: 0 0 20px #fff;">10!</h1>
      <p id="win-text" style="font-size: 1.5rem; letter-spacing: 5px;"></p>
      <button onclick="location.reload()">Play Again</button>
    </div>

    <!-- RULES -->
    <div class="rules-overlay" id="rules-overlay">
        <div class="settings-content">
            <h2>Rules</h2>
            <p>Connect 3 cells in a line that sum exactly to 10.</p>
            <p>Communal Scoring: Use any pieces on the board!</p>
            <button id="btn-rules-close">Got it</button>
        </div>
    </div>
  </div>
</div>

<script>
    // --- STATE ---
    let currentPlayer = 1;
    let mode = '2p';
    let difficulty = 'normal';
    let currentDiceValue = null;
    let board = new Array(27).fill(null);
    let gameOver = false;
    let isSpinning = false;

    // --- WINNING LINES DATA ---
    const winningLines = [];
    // Helper to generate all lines
    const genLines = () => {
        // 1D lines through X, Y, Z
        for(let z=0; z<3; z++) for(let y=0; y<3; y++) winningLines.push([z*9+y*3, z*9+y*3+1, z*9+y*3+2]); // X
        for(let z=0; z<3; z++) for(let x=0; x<3; x++) winningLines.push([z*9+x, z*9+3+x, z*9+6+x]); // Y
        for(let y=0; y<3; y++) for(let x=0; x<3; x++) winningLines.push([y*3+x, 9+y*3+x, 18+y*3+x]); // Z
        // Diagonals (2D & 3D)
        for(let i=0; i<3; i++) {
            winningLines.push([i*9+0, i*9+4, i*9+8], [i*9+2, i*9+4, i*9+6]); // Z-planes
            winningLines.push([0*9+i*3, 1*9+i*3+1, 2*9+i*3+2], [0*9+i*3+2, 1*9+i*3+1, 2*9+i*3]); // Y-planes
            winningLines.push([0*9+i, 1*9+3+i, 2*9+6+i], [0*9+6+i, 1*9+3+i, 2*9+i]); // X-planes
        }
        winningLines.push([0, 13, 26], [2, 13, 24], [6, 13, 20], [8, 13, 18]); // 3D-cross
    };
    genLines();

    // --- INITIALIZE GRID ---
    const layers = [document.querySelector('.layer-bot'), document.querySelector('.layer-mid'), document.querySelector('.layer-top')];
    layers.forEach((layerEl, z) => {
        for(let i=0; i<9; i++) {
            const idx = z * 9 + i;
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.idx = idx;
            cell.innerHTML = `<div class="content"></div><div class="sum-popup"></div>`;
            cell.addEventListener('click', () => handleCellClick(idx));
            cell.addEventListener('mouseenter', () => showSumKnowledge(idx));
            cell.addEventListener('mouseleave', clearKnowledge);
            layerEl.appendChild(cell);
        }
    });

    // --- SUM KNOWLEDGE LOGIC ---
    function showSumKnowledge(idx) {
        if (currentDiceValue === null || board[idx] !== null || gameOver) return;
        
        const cellEl = document.querySelector(`.cell[data-idx="${idx}"]`);
        cellEl.classList.add('hover-active');
        
        const relatedLines = winningLines.filter(line => line.includes(idx));
        let sumStrings = [];

        relatedLines.forEach(line => {
            const values = line.map(pos => pos === idx ? currentDiceValue : (board[pos] ? board[pos].value : null));
            const existingValues = values.filter(v => v !== null);
            const sum = existingValues.reduce((a, b) => a + b, 0);
            
            // Highlight cells in the line
            line.forEach(pos => document.querySelector(`.cell[data-idx="${pos}"]`).classList.add('line-member'));

            // Create status string
            let str = values.map(v => v === null ? '?' : v).join('+');
            sumStrings.push(`${str} = ${sum}`);
        });

        cellEl.querySelector('.sum-popup').innerHTML = sumStrings.join('<br>');
    }

    function clearKnowledge() {
        document.querySelectorAll('.cell').forEach(c => {
            c.classList.remove('hover-active', 'line-member');
        });
    }

    // --- DICE LOGIC ---
    let diceRotationY = 0;
    function spinDice() {
        if (isSpinning || currentDiceValue !== null || gameOver) return;
        isSpinning = true;
        const result = Math.floor(Math.random() * 9) + 1;
        const targetAngle = -((result - 1) * 40);
        diceRotationY += 1440; // 4 full spins
        document.getElementById('dice-wheel').style.transform = `rotateY(${diceRotationY + targetAngle}deg)`;
        
        setTimeout(() => {
            isSpinning = false;
            currentDiceValue = result;
            document.querySelectorAll('.wheel-face').forEach((f, i) => f.classList.toggle('highlight', i === result-1));
            updateStatus();
            if (mode === '1p' && currentPlayer === 2) setTimeout(cpuMove, 800);
        }, 2500);
    }
    document.getElementById('dice-container').addEventListener('click', spinDice);

    // --- GAME LOGIC ---
    function handleCellClick(idx) {
        if (gameOver || currentDiceValue === null || board[idx] !== null) return;
        if (mode === '1p' && currentPlayer === 2) return;
        placePiece(idx);
    }

    function placePiece(idx) {
        board[idx] = { value: currentDiceValue, player: currentPlayer };
        const cell = document.querySelector(`.cell[data-idx="${idx}"]`);
        cell.querySelector('.content').textContent = currentDiceValue;
        cell.classList.add(`p${currentPlayer}`);
        
        const winLine = checkWin();
        if (winLine) {
            endGame(currentPlayer, winLine);
        } else {
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            currentDiceValue = null;
            updateStatus();
            if (mode === '1p' && currentPlayer === 2) setTimeout(spinDice, 600);
        }
    }

    function checkWin() {
        for (let line of winningLines) {
            const vals = line.map(i => board[i]?.value);
            if (vals.every(v => v !== undefined)) {
                if (vals[0] + vals[1] + vals[2] === 10) return line;
            }
        }
        return null;
    }

    function updateStatus() {
        const s = document.getElementById('status');
        if (currentDiceValue) s.textContent = `P${currentPlayer} Place: ${currentDiceValue}`;
        else s.textContent = `P${currentPlayer} Spin Dice`;
        document.querySelectorAll('.cell').forEach(c => {
            const i = parseInt(c.dataset.idx);
            c.classList.toggle('valid-target', board[i] === null && currentDiceValue !== null);
        });
    }

    function endGame(p, line) {
        gameOver = true;
        line.forEach(i => document.querySelector(`.cell[data-idx="${i}"]`).style.background = 'var(--neon-yellow)');
        document.getElementById('win-text').textContent = `PLAYER ${p} SUMMED TO 10!`;
        document.getElementById('win-overlay').classList.add('active');
    }

    // --- HARD CPU LOGIC (Strategic Heuristic) ---
    function cpuMove() {
        const empty = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
        let bestIdx = empty[0];

        if (difficulty === 'normal') {
            // Normal: Check if can win immediately, else random
            let winMove = empty.find(idx => {
                board[idx] = { value: currentDiceValue };
                const w = checkWin();
                board[idx] = null;
                return w;
            });
            bestIdx = winMove !== undefined ? winMove : empty[Math.floor(Math.random() * empty.length)];
        } else {
            // Hard: Heuristic Search
            let bestScore = -Infinity;
            
            for (let idx of empty) {
                let score = 0;
                board[idx] = { value: currentDiceValue, player: 2 };

                // 1. Instant Win? (Highest Priority)
                if (checkWin()) score += 10000;

                // 2. Strategic Value of lines
                const related = winningLines.filter(l => l.includes(idx));
                related.forEach(line => {
                    const vals = line.map(i => board[i]?.value).filter(v => v !== undefined);
                    const sum = vals.reduce((a, b) => a+b, 0);

                    if (vals.length === 2) {
                        // Creating a "threat" (a sum that could become 10)
                        // A line that needs 1-9 to hit 10 is valuable
                        if (sum < 10) score += 50; 
                        if (sum === 10) score += 100; // This shouldn't happen here as checkWin caught it
                    }
                    
                    // 3. Block Opponent (Look for lines where sum is close to 10)
                    // If a line already has 2 pieces and sums to 1-9, it's dangerous
                    // Hard CPU will try to "deaden" that line by making the sum > 10
                    if (sum > 10) score += 10; // Making a line "un-winnable" is a safe play
                });

                // 4. Position weighting (Center of cube is idx 13)
                if (idx === 13) score += 30;

                board[idx] = null;
                if (score > bestScore) {
                    bestScore = score;
                    bestIdx = idx;
                }
            }
        }
        placePiece(bestIdx);
    }

    // --- UI CONTROLS ---
    const sOverlay = document.getElementById('settings-overlay');
    const rOverlay = document.getElementById('rules-overlay');
    
    document.getElementById('btn-settings-open').onclick = () => sOverlay.classList.add('active');
    document.getElementById('btn-settings-close').onclick = () => sOverlay.classList.remove('active');
    document.getElementById('btn-rules-open').onclick = () => rOverlay.classList.add('active');
    document.getElementById('btn-rules-close').onclick = () => rOverlay.classList.remove('active');

    document.getElementById('mode-1p').onclick = (e) => { mode = '1p'; updateBtns(e.target, 'mode'); };
    document.getElementById('mode-2p').onclick = (e) => { mode = '2p'; updateBtns(e.target, 'mode'); };
    document.getElementById('diff-norm').onclick = (e) => { difficulty = 'normal'; updateBtns(e.target, 'diff'); };
    document.getElementById('diff-hard').onclick = (e) => { difficulty = 'hard'; updateBtns(e.target, 'diff'); };

    function updateBtns(el, type) {
        document.querySelectorAll(`button[id^="${type}"]`).forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    // --- BOARD ROTATION ---
    let isDragging = false; let startX, startY;
    let rotX = 55, rotZ = -25;
    const boardEl = document.getElementById('board');
    
    window.onmousedown = (e) => { isDragging = true; startX = e.clientX; startY = e.clientY; };
    window.onmousemove = (e) => {
        if (!isDragging) return;
        rotZ += (e.clientX - startX) * 0.5;
        rotX -= (e.clientY - startY) * 0.5;
        boardEl.style.transform = `rotateX(${rotX}deg) rotateZ(${rotZ}deg)`;
        startX = e.clientX; startY = e.clientY;
    };
    window.onmouseup = () => isDragging = false;

    updateStatus();
    rOverlay.classList.add('active');
</script>
</body>
</html>
